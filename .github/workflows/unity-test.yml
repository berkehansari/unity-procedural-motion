name: Unity Automated Test Suite 🧪

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  runTests:
    name: Run Unity Unit Tests 🚀
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout LFS
        run: |
          git lfs checkout

      - name: Create Unity Sandbox Environment
        run: |
          mkdir -p UnitySandbox/Assets
          mkdir -p UnitySandbox/ProjectSettings
          mkdir -p UnitySandbox/Packages
          echo "m_EditorVersion: 6000.0.43f1" > UnitySandbox/ProjectSettings/ProjectVersion.txt
          echo '{"dependencies": {"org.berkehansari.proceduralmotion": "file:${{ github.workspace }}"}, "testables": ["org.berkehansari.proceduralmotion"]}' > UnitySandbox/Packages/manifest.json

      - name: Execute Runtime Unit Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: UnitySandbox
          testMode: playmode
          artifactsPath: artifacts
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test Results
          path: artifacts
