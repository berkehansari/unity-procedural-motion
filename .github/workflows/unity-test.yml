name: Unity Automated Test Suite 🧪

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  runTests:
    name: Run Unity Unit Tests 🚀
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Reorganize Workspace for Package Testing
        run: |
          mkdir -p unity-package

          mv Runtime Tests package.json README.md unity-package/ 2>/dev/null || true
          if [ -d "Samples~" ]; then mv Samples~ unity-package/; fi

          mkdir -p TestProject/Assets
          mkdir -p TestProject/ProjectSettings
          mkdir -p TestProject/Packages

          echo "m_EditorVersion: 6000.0.43f1" > TestProject/ProjectSettings/ProjectVersion.txt

          # Explicitly adding the test-framework ensures Unity registers the test runner UI/command line args safely
          echo '{
            "dependencies": {
              "com.unity.test-framework": "1.3.9",
              "org.berkehansari.proceduralmotion": "file:../unity-package"
            },
            "testables": [
              "org.berkehansari.proceduralmotion"
            ]
          }' > TestProject/Packages/manifest.json

      - name: Execute Runtime Unit Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: TestProject
          testMode: playmode
          artifactsPath: artifacts
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test Results
          path: artifacts
